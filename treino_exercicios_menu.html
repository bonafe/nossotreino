<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Treino de Exercícios — Escolher treino</title>
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #ffffff;
      background:
        radial-gradient(circle at top, rgba(56, 189, 248, 0.24), transparent 34%),
        linear-gradient(160deg, #020617, #0f172a 50%, #111827);
      display: flex;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
    }

    main {
      width: min(680px, 100%);
      padding-top: 8px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: clamp(1.6rem, 7vw, 2.4rem);
      letter-spacing: -0.04em;
      font-weight: 1000;
      text-align: center;
    }

    p.subtitle {
      margin: 0 0 22px;
      text-align: center;
      color: #94a3b8;
      font-size: clamp(0.95rem, 3.5vw, 1.05rem);
    }

    .lista {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .treino {
      display: block;
      position: relative;
      text-decoration: none;
      color: inherit;
      background: rgba(15, 23, 42, 0.86);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 24px;
      padding: 20px;
      box-shadow: 0 16px 50px rgba(0, 0, 0, 0.30);
    }

    .treino.hoje {
      border-color: rgba(190, 242, 100, 0.6);
    }

    .treino:active {
      transform: translateY(1px) scale(0.99);
    }

    .cabecalho {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .treino h2 {
      margin: 0;
      font-size: clamp(1.2rem, 5vw, 1.5rem);
      font-weight: 1000;
      letter-spacing: -0.02em;
      color: #bef264;
    }

    .tag {
      flex-shrink: 0;
      background: rgba(148, 163, 184, 0.16);
      border: 1px solid rgba(148, 163, 184, 0.3);
      color: #cbd5e1;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .tag.hoje {
      background: rgba(190, 242, 100, 0.18);
      border-color: rgba(190, 242, 100, 0.5);
      color: #bef264;
    }

    .resumo {
      color: #94a3b8;
      font-size: 0.92rem;
    }

    .estado {
      text-align: center;
      color: #94a3b8;
      padding: 30px 10px;
    }

    .estado a {
      color: #bef264;
    }

    .voltar {
      display: block;
      text-align: center;
      margin-top: 22px;
      color: #94a3b8;
      font-size: 0.92rem;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>🏋️ Treino de Exercícios</h1>
    <p class="subtitle">Escolha um treino para começar.</p>

    <div id="lista" class="lista">
      <div class="estado">Carregando treinos…</div>
    </div>

    <a class="voltar" href="index.html">← Voltar</a>
  </main>

  <script src="storage.js"></script>
  <script>
    const DIAS_SEMANA = ["domingo", "segunda", "terca", "quarta", "quinta", "sexta", "sabado"];

    const LABEL_TIPO = {
      musculacao: "Musculação",
      "peso-do-corpo": "Peso do corpo",
      funcional: "Funcional",
      flexibilidade: "Flexibilidade"
    };

    function contarExercicios(treino) {
      return treino.blocos.reduce((total, bloco) => total + bloco.itens.length, 0);
    }

    function diaDeHoje() {
      return DIAS_SEMANA[new Date().getDay()];
    }

    function treinoDeHoje(dados) {
      const hoje = diaDeHoje();
      const entrada = dados.distribuicaoSemanal.find((d) => d.dia === hoje);
      return entrada ? entrada.treinoId : null;
    }

    function cartaoTreino(treino, idTreinoHoje) {
      const a = document.createElement("a");
      const ehHoje = treino.id === idTreinoHoje;
      a.className = ehHoje ? "treino hoje" : "treino";
      a.href = `treino_exercicios.html?treino=${encodeURIComponent(treino.id)}`;

      const qtdExercicios = contarExercicios(treino);
      const resumo = qtdExercicios === 0
        ? "Nenhum exercício cadastrado"
        : `${qtdExercicios} exercício${qtdExercicios === 1 ? "" : "s"}`;

      a.innerHTML = `
        <div class="cabecalho">
          <h2>${treino.nome}</h2>
          <span class="tag ${ehHoje ? "hoje" : ""}">${ehHoje ? "Hoje · " : ""}${LABEL_TIPO[treino.tipo] || treino.tipo}</span>
        </div>
        <div class="resumo">${resumo}</div>
      `;
      return a;
    }

    async function carregarTreinos() {
      const listaEl = document.getElementById("lista");

      try {
        const dados = await TreinosStorage.carregarDadosTreinos();
        const idTreinoHoje = treinoDeHoje(dados);

        listaEl.innerHTML = "";
        dados.treinos.forEach((treino) => listaEl.appendChild(cartaoTreino(treino, idTreinoHoje)));
      } catch (erro) {
        listaEl.innerHTML =
          '<div class="estado">Nenhum dado de treino carregado ainda neste navegador. <a href="importar_dados.html">Carregue o arquivo dados_treinos.json</a> pra começar.</div>';
      }
    }

    carregarTreinos();
  </script>
</body>
</html>
